<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>RadarPazar | Ürün Araştırma Platformu</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      color: #172033;
    }

    header {
      background: #111827;
      color: white;
      text-align: center;
      padding: 30px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 38px;
    }

    header p {
      margin: 10px 0 0;
      color: #cbd5e1;
    }

    .container {
      width: min(1100px, 92%);
      margin: 40px auto;
    }

    .search-box {
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
    }

    .search-box h2 {
      margin-top: 0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 15px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 15px;
    }

    .search-button {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 17px;
      cursor: pointer;
    }

    .search-button:hover {
      background: #1d4ed8;
    }

    .marketplaces {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .market-badge {
      background: #e2e8f0;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
    }

    .results-title {
      margin-top: 35px;
    }

    .product-card {
      background: white;
      margin-top: 18px;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .07);
    }

    .product-card h3 {
      margin-top: 0;
      margin-bottom: 9px;
      font-size: 21px;
    }

    .product-info {
      color: #64748b;
      margin-bottom: 17px;
    }

    .market-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .market-button {
      display: block;
      padding: 12px 8px;
      border-radius: 9px;
      text-align: center;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: transform .15s;
    }

    .market-button:hover {
      transform: translateY(-2px);
    }

    .amazon {
      background: #232f3e;
    }

    .trendyol {
      background: #f27a1a;
    }

    .hepsiburada {
      background: #ff6000;
    }

    .n11 {
      background: #8b2bbf;
    }

    .pazarama {
      background: #1167b1;
    }

    .pttavm {
      background: #e31e24;
    }

    .empty {
      background: white;
      margin-top: 20px;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: #64748b;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #64748b;
    }

    @media (max-width: 800px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .market-buttons {
        grid-template-columns: 1fr 1fr;
      }

      header h1 {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>📡 RadarPazar</h1>
  <p>Tek aramayla Türkiye'nin büyük pazaryerlerini tara</p>
</header>

<main class="container">

  <section class="search-box">
    <h2>🔍 Ürün Ara</h2>

    <div class="form-grid">

      <div class="field">
        <label for="urunAdi">Ürün veya marka</label>
        <input
          type="text"
          id="urunAdi"
          placeholder="Örnek: Bioderma Atoderm 500 ml"
        >
      </div>

      <div class="field">
        <label for="kategori">Kategori</label>
        <select id="kategori">
          <option value="">Tüm kategoriler</option>
          <option value="Kozmetik">Kozmetik</option>
          <option value="Elektronik">Elektronik</option>
          <option value="Ev ve yaşam">Ev ve yaşam</option>
          <option value="Anne ve bebek">Anne ve bebek</option>
        </select>
      </div>

      <div class="field">
        <label for="minFiyat">Minimum fiyat</label>
        <input type="number" id="minFiyat" placeholder="250">
      </div>

      <div class="field">
        <label for="maxFiyat">Maksimum fiyat</label>
        <input type="number" id="maxFiyat" placeholder="1500">
      </div>

    </div>

    <button class="search-button" onclick="urunAra()">
      📡 Pazaryerlerinde Ara
    </button>

    <div class="marketplaces">
      <span class="market-badge">Amazon</span>
      <span class="market-badge">Trendyol</span>
      <span class="market-badge">Hepsiburada</span>
      <span class="market-badge">N11</span>
      <span class="market-badge">Pazarama</span>
      <span class="market-badge">PttAVM</span>
    </div>
  </section>

  <section id="sonuclar"></section>

</main>

<footer>
  RadarPazar © 2026 – Akıllı ürün araştırma platformu
</footer>

<script>
  function pazarYeriLinkleri(urunAdi) {
    const q = encodeURIComponent(urunAdi);

    return {
      amazon: `https://www.amazon.com.tr/s?k=${q}`,
      trendyol: `https://www.trendyol.com/sr?q=${q}`,
      hepsiburada: `https://www.hepsiburada.com/ara?q=${q}`,
      n11: `https://www.n11.com/arama?q=${q}`,

      /*
        Pazarama ve PttAVM'nin doğrudan arama bağlantıları
        değişebildiği için şimdilik güvenilir Google site araması kullanıyoruz.
      */
      pazarama: `https://www.google.com/search?q=site%3Apazarama.com+${q}`,
      pttavm: `https://www.google.com/search?q=site%3Apttavm.com+${q}`
    };
  }

  function urunAra() {
    const urunAdi = document.getElementById("urunAdi").value.trim();
    const kategori = document.getElementById("kategori").value;
    const minFiyat = document.getElementById("minFiyat").value;
    const maxFiyat = document.getElementById("maxFiyat").value;
    const sonuclar = document.getElementById("sonuclar");

    if (!urunAdi) {
      sonuclar.innerHTML = `
        <div class="empty">
          Önce aramak istediğin ürünün veya markanın adını yazmalısın.
        </div>
      `;

      document.getElementById("urunAdi").focus();
      return;
    }

    const linkler = pazarYeriLinkleri(urunAdi);

    let filtreBilgisi = kategori || "Tüm kategoriler";

    if (minFiyat || maxFiyat) {
      filtreBilgisi += " • ";

      if (minFiyat) {
        filtreBilgisi += `${minFiyat} TL`;
      } else {
        filtreBilgisi += "0 TL";
      }

      filtreBilgisi += " – ";

      if (maxFiyat) {
        filtreBilgisi += `${maxFiyat} TL`;
      } else {
        filtreBilgisi += "Üst sınır yok";
      }
    }

    sonuclar.innerHTML = `
      <h2 class="results-title">Arama sonucu</h2>

      <article class="product-card">
        <h3>${guvenliMetin(urunAdi)}</h3>

        <div class="product-info">
          ${guvenliMetin(filtreBilgisi)}
        </div>

        <div class="market-buttons">

          <a
            class="market-button amazon"
            href="${linkler.amazon}"
            target="_blank"
            rel="noopener noreferrer"
          >
            Amazon'da Ara
          </a>

          <a
            class="market-button trendyol"
            href="${linkler.trendyol}"
            target="_blank"
            rel="noopener noreferrer"
          >
            Trendyol'da Ara
          </a>

          <a
            class="market-button hepsiburada"
            href="${linkler.hepsiburada}"
            target="_blank"
            rel="noopener noreferrer"
          >
            Hepsiburada'da Ara
          </a>

          <a
            class="market-button n11"
            href="${linkler.n11}"
            target="_blank"
            rel="noopener noreferrer"
          >
            N11'de Ara
          </a>

          <a
            class="market-button pazarama"
            href="${linkler.pazarama}"
            target="_blank"
            rel="noopener noreferrer"
          >
            Pazarama'da Ara
          </a>

          <a
            class="market-button pttavm"
            href="${linkler.pttavm}"
            target="_blank"
            rel="noopener noreferrer"
          >
            PttAVM'de Ara
          </a>

        </div>
      </article>
    `;
  }

  function guvenliMetin(metin) {
    return metin
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  document
    .getElementById("urunAdi")
    .addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        urunAra();
      }
    });
</script>

</body>
</html>
