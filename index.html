<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ürün Avcısı</title>

<style>

body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f4f7;
}

header {
    background:#111827;
    color:white;
    padding:25px;
    text-align:center;
}

header h1 {
    margin:0;
    font-size:32px;
}

header p {
    margin-top:10px;
    color:#d1d5db;
}


.container {
    max-width:900px;
    margin:30px auto;
    padding:20px;
}


.panel {
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}


.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}


input, select {
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}


button {

    width:100%;
    margin-top:20px;
    padding:14px;

    background:#2563eb;
    color:white;

    border:none;
    border-radius:10px;

    font-size:16px;
    cursor:pointer;

}


button:hover {
    background:#1d4ed8;
}



.product {

    margin-top:25px;
    background:white;

    padding:20px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,.08);

}



.product h3 {
    margin-top:0;
}


.tag {

    display:inline-block;

    background:#e0f2fe;

    padding:6px 10px;

    border-radius:20px;

    margin-right:5px;

    font-size:13px;

}



.amazon {

    display:block;

    margin-top:15px;

    text-align:center;

    background:#ff9900;

    color:white;

    padding:12px;

    border-radius:8px;

    text-decoration:none;

}


</style>

</head>


<body>


<header>

<h1>🚀 Ürün Avcısı</h1>

<p>Kârlı ürünleri daha hızlı bul</p>

</header>



<div class="container">


<div class="panel">


<h2>🔍 Ürün Ara</h2>


<div class="grid">


<div>

<label>Kategori</label>

<select>

<option>Kozmetik</option>

<option>Kişisel Bakım</option>

<option>Elektronik</option>

<option>Ev Yaşam</option>

</select>

</div>



<div>

<label>Minimum Fiyat</label>

<input placeholder="250 TL">

</div>


<div>

<label>Maksimum Fiyat</label>

<input placeholder="1000 TL">

</div>


<div>

<label>Minimum Yorum</label>

<input placeholder="200">

</div>



</div>


<button onclick="urunAra()">🔎 ARA</button>


</div>




<div class="product">


<h3>Örnek Ürün</h3>


<span class="tag">⭐ 4.8 Puan</span>

<span class="tag">💬 1250 Yorum</span>


<p>💰 Fiyat: 799 TL</p>


<a class="amazon" href="#" target="_blank">

Amazon'da Aç

</a>


</div>



</div>


<script>

function urunAra(){

alert("Buton çalışıyor!");

document.querySelector(".product").innerHTML = `
<h3>📦 Bioderma Atoderm Creme Ultra 500 ml</h3>

<span class="tag">⭐ 4.8 Puan</span>

<span class="tag">💬 1250 Yorum</span>

<p>💰 Fiyat: 799 TL</p>

<p>
🏷️ Marka: Bioderma
</p>


<a class="amazon" 
href="https://www.amazon.com.tr/" 
target="_blank">

Amazon'da Aç

</a>

`;


}

</script>
</body>

</html>
